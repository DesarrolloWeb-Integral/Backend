name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validation:
    name: Validate, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cumple: "muestra un mensaje en consola correctamente"
      - name: Show initialization message
        run: echo "Starting CI/CD pipeline validation workflow..."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Cumple: "instala las dependencias del proyecto como paso previo"
      - name: Install dependencies
        run: npm ci

      # Cumple: "ESLint se ejecuta automáticamente en cada Pull Request"
      - name: Run ESLint
        run: npm run lint

      # Cumple: "ejecuta las pruebas unitarias del proyecto"
      # Nota: Usamos --passWithNoTests para asegurar que no truene si aún no creas archivos .spec
      - name: Run Unit Tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Cumple: "El token de Vercel se almacena como Secret... y despliega automáticamente tras merge a main"
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: Deploy Backend to Railway
    needs: validation
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      # Cumple: "El workflow despliega el Backend en Railway"
      - name: Deploy to Railway
        run: railway deploy --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
